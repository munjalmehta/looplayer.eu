<html lang="de" data-lang="de">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopLayer – Das digitale Rückgrat der europäischen Textilzirkularität</title>
  <meta name="description" content="LoopLayer verbindet Hersteller, Recycler und Kommunen im EU-Textilkreislauf. EPR-Zertifikate, CSRD ESRS E5, Digital Product Passport – automatisch aus jeder bestätigten Transaktion.">
  <meta property="og:title" content="LoopLayer – Textile Circularity Platform">

  <style>
    /* Skeleton loader */
    .mod-placeholder {
      min-height: 60px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton 1.4s ease infinite;
      border-radius: 4px;
    }
    @keyframes skeleton {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
